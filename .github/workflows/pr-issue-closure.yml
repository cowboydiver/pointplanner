name: PR issue-closure policy

# Fail a PR that references a tracked issue without closing it via a keyword in
# the body. GitHub only auto-closes issues named with Closes/Fixes/Resolves in
# the PR body; a bare reference (or an issue named only in the title) strands it
# as open-but-done. See docs/agents/issue-tracker.md.
on:
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  check:
    runs-on: ubuntu-latest
    # Drafts are works-in-progress; only gate PRs that are ready for review.
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/check-pr-closure.ts
        env:
          # `gh` (preinstalled on the runner) resolves each #N to issue/PR/missing.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
